user_groups:
  - docker
  - sudo

directories:
  - ~/.aws
  - ~/.ssh
  - ~/.local/bin
  - ~/.terraform.d/plugins
  - ~/.kube
  - ~/projects

files:
  - ~/.bashrc
  - ~/.bash_profile
  - ~/.vimrc

scripts:
  root:
    - bash_profile
    - vimrc
  specific:
    - dir: .tfenv
      file: use-gpgv
    - dir: .ssh
      file: config

bashrc_includes:
  - "[ -f ~/.bash_profile ] && . ~/.bash_profile"

git_repos:
  # Environment
  - name: .local/share/tfenv
    repo: https://github.com/tfutils/tfenv.git
  - name: .local/share/tgenv
    repo: https://github.com/cunymatthieu/tgenv.git

repos: []
